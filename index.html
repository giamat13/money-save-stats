<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הכסף שלי 💰</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c16;
  --surface: #0f1623;
  --surface2: #161f30;
  --border: #1e2d45;
  --gold: #f0b429;
  --gold-dim: rgba(240,180,41,0.12);
  --green: #10b981;
  --red: #f43f5e;
  --blue: #38bdf8;
  --purple: #c084fc;
  --text: #e8f0ff;
  --muted: #5a6a88;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

#auth-screen {
  display:flex; align-items:center; justify-content:center; min-height:100vh;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, #112244 0%, var(--bg) 70%);
}
.auth-box {
  background:var(--surface); border:1px solid var(--border); border-radius:24px;
  padding:48px 40px; max-width:400px; width:90%;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}
.auth-logo { text-align:center; font-size:3rem; margin-bottom:12px; }
.auth-box h1 { text-align:center; font-size:1.7rem; font-weight:900; margin-bottom:4px; }
.auth-box .sub { text-align:center; color:var(--muted); font-size:.9rem; margin-bottom:32px; }
.auth-tabs { display:flex; gap:0; margin-bottom:28px; background:var(--bg); border-radius:10px; padding:4px; }
.auth-tab {
  flex:1; padding:9px; text-align:center; font-size:.9rem; font-weight:600;
  cursor:pointer; border-radius:8px; transition:.2s; color:var(--muted); user-select:none;
}
.auth-tab.active { background:var(--gold); color:#000; }
.auth-form { display:flex; flex-direction:column; gap:14px; }
.auth-form input {
  background:var(--bg); border:1px solid var(--border); border-radius:10px;
  padding:13px 16px; color:var(--text); font-family:'Heebo',sans-serif; font-size:.95rem;
  outline:none; transition:border-color .2s; direction:ltr; text-align:right;
}
.auth-form input:focus { border-color:var(--gold); }
.auth-form input::placeholder { color:var(--muted); }
#auth-error { color:var(--red); font-size:.85rem; text-align:center; min-height:20px; }
.btn {
  padding:12px 20px; border-radius:10px; font-family:'Heebo',sans-serif;
  font-weight:700; font-size:.95rem; cursor:pointer; border:none;
  transition:all .2s; display:inline-flex; align-items:center; gap:8px;
}
.btn-gold { background:var(--gold); color:#000; }
.btn-gold:hover { background:#e0a820; transform:translateY(-1px); box-shadow:0 6px 20px rgba(240,180,41,0.3); }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--gold); color:var(--gold); }
.btn-danger { background:rgba(244,63,94,0.15); color:var(--red); border:1px solid rgba(244,63,94,0.3); }
.btn-danger:hover { background:rgba(244,63,94,0.25); }
.btn-full { width:100%; justify-content:center; }
.btn-sm { padding:7px 14px; font-size:.83rem; }

#app { display:none; }
nav {
  position:sticky; top:0; z-index:100;
  background:rgba(8,12,22,0.92); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 28px; height:60px;
  display:flex; align-items:center; justify-content:space-between;
}
.nav-brand { font-weight:900; font-size:1.15rem; display:flex; align-items:center; gap:10px; }
.nav-brand .coin { color:var(--gold); font-size:1.4rem; }
.nav-user { color:var(--muted); font-size:.85rem; display:flex; align-items:center; gap:12px; }
.container { max-width:1080px; margin:0 auto; padding:28px 24px; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:28px; }
.stat-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:22px 20px; position:relative; overflow:hidden; transition:.2s;
}
.stat-card:hover { border-color:rgba(240,180,41,0.4); transform:translateY(-2px); }
.stat-glow {
  position:absolute; top:-20px; left:-20px; width:80px; height:80px;
  border-radius:50%; opacity:.1; filter:blur(20px);
}
.stat-label { font-size:.78rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.stat-value { font-size:1.6rem; font-weight:900; font-family:'Space Mono',monospace; }
.stat-sub { font-size:.78rem; color:var(--muted); margin-top:4px; }
.main-grid { display:grid; grid-template-columns:1fr 360px; gap:20px; align-items:start; }
@media(max-width:800px) { .main-grid { grid-template-columns:1fr; } }
.section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.section-header {
  padding:18px 22px; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
}
.section-title { font-weight:700; font-size:1rem; }
.filters { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:14px 22px; border-bottom:1px solid var(--border); }
.filter-btn {
  padding:5px 12px; border-radius:20px; font-size:.78rem; font-weight:600;
  cursor:pointer; border:1px solid var(--border); background:transparent;
  color:var(--muted); font-family:'Heebo',sans-serif; transition:.15s;
}
.filter-btn.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
table { width:100%; border-collapse:collapse; }
th {
  padding:12px 16px; text-align:right; font-size:.75rem; font-weight:700;
  color:var(--muted); text-transform:uppercase; letter-spacing:.4px;
  border-bottom:1px solid var(--border); background:var(--bg);
}
td { padding:11px 16px; font-size:.88rem; border-bottom:1px solid rgba(30,45,69,0.5); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(240,180,41,0.03); }
.tx-badge {
  display:inline-block; padding:3px 8px; border-radius:6px; font-size:.72rem; font-weight:700;
}
.b-in { background:rgba(16,185,129,0.15); color:var(--green); }
.b-out { background:rgba(244,63,94,0.15); color:var(--red); }
.b-dep { background:rgba(56,189,248,0.15); color:var(--blue); }
.b-wdraw { background:rgba(192,132,252,0.15); color:var(--purple); }
.b-bal { background:rgba(240,180,41,0.15); color:var(--gold); }
.a-in { color:var(--green); font-weight:700; font-family:'Space Mono',monospace; font-size:.82rem; }
.a-out { color:var(--red); font-weight:700; font-family:'Space Mono',monospace; font-size:.82rem; }
.a-neu { color:var(--muted); font-family:'Space Mono',monospace; font-size:.82rem; }
.empty-state { text-align:center; padding:48px; color:var(--muted); }
.sidebar { display:flex; flex-direction:column; gap:16px; }
.form-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; }
.form-title { font-weight:700; font-size:.95rem; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
.form-group { margin-bottom:14px; }
.form-label { font-size:.78rem; color:var(--muted); font-weight:600; margin-bottom:6px; display:block; }
.form-control {
  width:100%; background:var(--bg); border:1px solid var(--border);
  border-radius:10px; padding:11px 14px; color:var(--text);
  font-family:'Heebo',sans-serif; font-size:.9rem; outline:none; transition:.2s;
}
.form-control:focus { border-color:var(--gold); }
.form-control option { background:var(--surface2); }
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
  align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:32px; max-width:420px; width:90%;
  box-shadow:0 40px 80px rgba(0,0,0,0.5);
}
.modal h2 { font-size:1.2rem; font-weight:900; margin-bottom:20px; }
.modal-actions { display:flex; gap:10px; margin-top:20px; }
.loader { text-align:center; padding:40px; color:var(--muted); }
.spinner {
  width:28px; height:28px; border:3px solid var(--border);
  border-top-color:var(--gold); border-radius:50%;
  animation:spin .8s linear infinite; margin:0 auto 10px;
}
@keyframes spin { to { transform:rotate(360deg); } }
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; padding:12px 24px; font-size:.9rem; font-weight:600;
  transition:.3s; z-index:999; pointer-events:none;
}
#toast.show { transform:translateX(-50%) translateY(0); }
#toast.success { border-color:var(--green); color:var(--green); }
#toast.error { border-color:var(--red); color:var(--red); }
.goal-item { padding:12px 0; border-bottom:1px solid var(--border); }
.goal-item:last-child { border-bottom:none; padding-bottom:0; }
.goal-bar { height:6px; background:var(--bg); border-radius:100px; overflow:hidden; margin:6px 0; }
.goal-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--blue),var(--purple)); transition:.6s; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">💰</div>
    <h1>הכסף שלי</h1>
    <p class="sub">מעקב חכם אחרי הכסף שלך</p>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">כניסה</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">הרשמה</div>
    </div>
    <div class="auth-form">
      <input type="email" id="auth-email" placeholder="אימייל" />
      <input type="password" id="auth-password" placeholder="סיסמה" />
      <input type="text" id="auth-name" placeholder="שם תצוגה" style="display:none" />
      <div id="auth-error"></div>
      <button class="btn btn-gold btn-full" onclick="doAuth()">
        <span id="auth-btn-text">התחבר</span>
      </button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <nav>
    <div class="nav-brand"><span class="coin">💰</span> הכסף שלי</div>
    <div class="nav-user">
      <span id="nav-user-name"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">יציאה</button>
    </div>
  </nav>

  <div class="container">

    <!-- STAT CARDS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-glow" style="background:var(--gold)"></div>
        <div class="stat-label">סה"כ נחסך</div>
        <div class="stat-value" style="color:var(--gold)" id="stat-total">₪0</div>
        <div class="stat-sub" id="stat-since"></div>
      </div>
      <div class="stat-card">
        <div class="stat-glow" style="background:var(--green)"></div>
        <div class="stat-label">בבנק</div>
        <div class="stat-value" style="color:var(--green)" id="stat-bank">₪0</div>
        <div class="stat-sub">חיסכון בטוח</div>
      </div>
      <div class="stat-card">
        <div class="stat-glow" style="background:var(--blue)"></div>
        <div class="stat-label">בארנק</div>
        <div class="stat-value" style="color:var(--blue)" id="stat-wallet">₪0</div>
        <div class="stat-sub">מזומן</div>
      </div>
      <div class="stat-card">
        <div class="stat-glow" style="background:var(--purple)"></div>
        <div class="stat-label">חיסכון לחודש</div>
        <div class="stat-value" style="color:var(--purple)" id="stat-monthly">₪0</div>
        <div class="stat-sub" id="stat-yearly"></div>
      </div>
    </div>

    <!-- CHART -->
    <div class="section" style="margin-bottom:20px">
      <div class="section-header">
        <div class="section-title">📊 הכנסות vs הוצאות — 6 חודשים אחרונים</div>
      </div>
      <div id="chart-area" style="padding:20px">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>

    <div class="main-grid">
      <!-- TRANSACTIONS TABLE -->
      <div>
        <div class="section">
          <div class="section-header">
            <div class="section-title">📋 פעולות</div>
          </div>
          <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all',this)">הכל</button>
            <button class="filter-btn" onclick="setFilter('הכנסה',this)">הכנסות</button>
            <button class="filter-btn" onclick="setFilter('הוצאה',this)">הוצאות</button>
            <button class="filter-btn" onclick="setFilter('הפקדה',this)">הפקדות</button>
            <button class="filter-btn" onclick="setFilter('משיכה',this)">משיכות</button>
          </div>
          <div id="tx-table-wrap">
            <div class="loader"><div class="spinner"></div>טוען...</div>
          </div>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="form-section">
          <div class="form-title">➕ פעולה חדשה</div>
          <div class="form-group">
            <label class="form-label">סוג פעולה</label>
            <select class="form-control" id="tx-type">
              <option value="הכנסה">💚 הכנסה</option>
              <option value="הוצאה">🔴 הוצאה</option>
              <option value="הפקדה">🔵 הפקדה לבנק</option>
              <option value="משיכה">🟣 משיכה מבנק</option>
              <option value="הכנסת בנק">🏦 הכנסת בנק</option>
              <option value="הוצאת בנק">🏦 הוצאת בנק</option>
              <option value="איזון ארנק">⚖️ איזון ארנק</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">סכום (₪)</label>
            <input type="number" class="form-control" id="tx-amount" placeholder="0.00" step="0.01" min="0" />
          </div>
          <div class="form-group">
            <label class="form-label">תיאור</label>
            <input type="text" class="form-control" id="tx-desc" placeholder="למה זה?" />
          </div>
          <div class="form-group">
            <label class="form-label">קטגוריה</label>
            <input type="text" class="form-control" id="tx-cat" placeholder="ספרים, מתנות..." />
          </div>
          <div class="form-group">
            <label class="form-label">תאריך</label>
            <input type="date" class="form-control" id="tx-date" />
          </div>
          <button class="btn btn-gold btn-full" onclick="addTransaction()">שמור פעולה</button>
        </div>

        <div class="form-section">
          <div class="form-title" style="justify-content:space-between">
            <span>🎯 יעדי חיסכון</span>
            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('goal-modal').classList.add('open')">+ יעד</button>
          </div>
          <div id="goals-list">
            <div class="loader" style="padding:12px"><div class="spinner" style="width:20px;height:20px;margin-bottom:6px"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- GOAL MODAL -->
<div class="modal-overlay" id="goal-modal">
  <div class="modal">
    <h2>🎯 יעד חיסכון חדש</h2>
    <div class="form-group">
      <label class="form-label">מה אתה חוסך עבורו?</label>
      <input type="text" class="form-control" id="goal-name" placeholder="אייפון, נסיעה..." />
    </div>
    <div class="form-group">
      <label class="form-label">כמה עולה? (₪)</label>
      <input type="number" class="form-control" id="goal-target" placeholder="0" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="saveGoal()">שמור</button>
      <button class="btn btn-ghost" onclick="document.getElementById('goal-modal').classList.remove('open')">ביטול</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc,
  onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// ── Init Firebase ──
const app = initializeApp({
  apiKey: "AIzaSyB7CP_JYF37lC7x0YGujBO42PhGsoesk74",
  authDomain: "money-save-stats.firebaseapp.com",
  projectId: "money-save-stats",
  storageBucket: "money-save-stats.firebasestorage.app",
  messagingSenderId: "450727973112",
  appId: "1:450727973112:web:f700b9db3697f82fcfeb0d",
  measurementId: "G-WR5VS0K6LT"
});
const analytics = getAnalytics(app);
const auth      = getAuth(app);
const db        = getFirestore(app);

// ── State ──
let user = null, transactions = [], goals = [], activeFilter = 'all';
let unsubTx = null, unsubGoals = null;

// ── Utils ──
const fmt = n => '₪' + Math.abs(Number(n)).toLocaleString('he-IL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  setTimeout(() => el.className = '', 2600);
}
const userCol = (sub) => collection(db, `users/${user.uid}/${sub}`);

// ── Auth tab ──
window.switchTab = (tab) => {
  const isReg = tab === 'register';
  document.getElementById('tab-login').classList.toggle('active', !isReg);
  document.getElementById('tab-register').classList.toggle('active', isReg);
  document.getElementById('auth-name').style.display = isReg ? 'block' : 'none';
  document.getElementById('auth-btn-text').textContent = isReg ? 'הרשמה' : 'התחבר';
  document.getElementById('auth-error').textContent = '';
};

window.doAuth = async () => {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name     = document.getElementById('auth-name').value.trim();
  const isReg    = document.getElementById('auth-name').style.display !== 'none';
  const errEl    = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'אנא מלא אימייל וסיסמה'; return; }
  try {
    if (isReg) {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      if (name) await updateProfile(cred.user, { displayName: name });
      logEvent(analytics, 'sign_up');
    } else {
      await signInWithEmailAndPassword(auth, email, password);
      logEvent(analytics, 'login');
    }
  } catch (e) {
    const map = {
      'auth/email-already-in-use':'האימייל כבר רשום',
      'auth/invalid-email':'אימייל לא תקין',
      'auth/weak-password':'סיסמה חלשה — לפחות 6 תווים',
      'auth/user-not-found':'משתמש לא נמצא',
      'auth/wrong-password':'סיסמה שגויה',
      'auth/invalid-credential':'אימייל או סיסמה שגויים',
    };
    errEl.textContent = map[e.code] || e.message;
  }
};

window.logout = async () => {
  if (unsubTx) unsubTx();
  if (unsubGoals) unsubGoals();
  await signOut(auth);
};

// ── Transactions ──
window.addTransaction = async () => {
  const type   = document.getElementById('tx-type').value;
  const rawAmt = parseFloat(document.getElementById('tx-amount').value);
  const desc   = document.getElementById('tx-desc').value.trim();
  const cat    = document.getElementById('tx-cat').value.trim();
  const dateV  = document.getElementById('tx-date').value;
  if (!rawAmt || rawAmt <= 0) { showToast('הכנס סכום תקין', 'error'); return; }
  const amount = (type === 'הוצאה' || type === 'הוצאת בנק') ? -Math.abs(rawAmt) : Math.abs(rawAmt);
  await addDoc(userCol('transactions'), {
    type, amount, desc, cat,
    date: (dateV ? new Date(dateV) : new Date()).toISOString(),
    createdAt: serverTimestamp()
  });
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-desc').value   = '';
  document.getElementById('tx-cat').value    = '';
  logEvent(analytics, 'add_transaction', { type });
  showToast('נשמר! ✓');
};

window.deleteTransaction = async (id) => {
  if (!confirm('למחוק?')) return;
  await deleteDoc(doc(db, `users/${user.uid}/transactions`, id));
  showToast('נמחק');
};

// ── Goals ──
window.saveGoal = async () => {
  const name   = document.getElementById('goal-name').value.trim();
  const target = parseFloat(document.getElementById('goal-target').value);
  if (!name || !target) { showToast('מלא שם וסכום', 'error'); return; }
  await addDoc(userCol('goals'), { name, target, createdAt: serverTimestamp() });
  document.getElementById('goal-name').value   = '';
  document.getElementById('goal-target').value = '';
  document.getElementById('goal-modal').classList.remove('open');
  showToast('יעד נשמר! 🎯');
};
window.deleteGoal = async (id) => {
  await deleteDoc(doc(db, `users/${user.uid}/goals`, id));
  showToast('יעד נמחק');
};

// ── Filter ──
window.setFilter = (f, el) => {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
};

// ── Stats ──
function computeStats() {
  let bank = 0, wallet = 0;
  for (const t of transactions) {
    const a = Math.abs(t.amount);
    switch (t.type) {
      case 'הכנסה':       wallet += a; break;
      case 'הוצאה':       wallet -= a; break;
      case 'איזון ארנק':  wallet += t.amount; break;
      case 'הפקדה':       wallet -= a; bank += a; break;
      case 'משיכה':       wallet += a; bank -= a; break;
      case 'הכנסת בנק':   bank   += a; break;
      case 'הוצאת בנק':   bank   -= a; break;
    }
  }
  const total = bank + wallet;
  let earliest = new Date();
  for (const t of transactions) { const d = new Date(t.date); if (d < earliest) earliest = d; }
  const months  = Math.max(1, (Date.now() - earliest) / (1000*60*60*24*30.44));
  const monthly = total / months;
  document.getElementById('stat-total').textContent   = fmt(total);
  document.getElementById('stat-bank').textContent    = fmt(Math.max(0, bank));
  document.getElementById('stat-wallet').textContent  = fmt(Math.max(0, wallet));
  document.getElementById('stat-monthly').textContent = fmt(monthly);
  document.getElementById('stat-yearly').textContent  = fmt(monthly * 12) + ' לשנה';
  document.getElementById('stat-since').textContent   = transactions.length ? 'מאז ' + earliest.toLocaleDateString('he-IL') : '';
  return { bank, wallet, total, monthly };
}

// ── Table ──
function renderTable() {
  const rows = activeFilter === 'all' ? transactions
    : transactions.filter(t => t.type === activeFilter);
  const sorted = [...rows].sort((a,b) => new Date(b.date) - new Date(a.date));
  const wrap = document.getElementById('tx-table-wrap');

  if (!sorted.length) {
    wrap.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem;margin-bottom:10px">📭</div>אין פעולות</div>`;
    return;
  }
  const badge = t => {
    if (t.type==='הכנסה'||t.type==='הכנסת בנק') return 'b-in';
    if (t.type==='הוצאה'||t.type==='הוצאת בנק') return 'b-out';
    if (t.type==='הפקדה') return 'b-dep';
    if (t.type==='משיכה') return 'b-wdraw';
    return 'b-bal';
  };
  const amtCls = t => {
    if (t.type==='הכנסה'||t.type==='הכנסת בנק') return 'a-in';
    if (t.type==='הוצאה'||t.type==='הוצאת בנק') return 'a-out';
    return 'a-neu';
  };
  const sign = t => (t.type==='הכנסה'||t.type==='הכנסת בנק') ? '+' : (t.type==='הוצאה'||t.type==='הוצאת בנק') ? '-' : '';

  wrap.innerHTML = `<div style="overflow-x:auto"><table>
    <thead><tr>
      <th>תאריך</th><th>תיאור</th><th>סוג</th><th>קטגוריה</th><th>סכום</th><th></th>
    </tr></thead>
    <tbody>${sorted.map(t=>`<tr>
      <td style="color:var(--muted);font-size:.78rem;white-space:nowrap">${new Date(t.date).toLocaleDateString('he-IL')}</td>
      <td>${t.desc||'—'}</td>
      <td><span class="tx-badge ${badge(t)}">${t.type}</span></td>
      <td style="color:var(--muted);font-size:.8rem">${t.cat||'—'}</td>
      <td class="${amtCls(t)}">${sign(t)}${fmt(t.amount)}</td>
      <td><button class="btn btn-danger btn-sm" style="padding:4px 8px" onclick="deleteTransaction('${t.id}')">✕</button></td>
    </tr>`).join('')}
    </tbody>
  </table></div>`;
}

// ── Goals ──
function renderGoals() {
  const { total } = computeStats();
  const wrap = document.getElementById('goals-list');
  if (!goals.length) {
    wrap.innerHTML = `<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:8px">אין יעדים עדיין</div>`;
    return;
  }
  wrap.innerHTML = goals.map(g => {
    const pct = Math.min(100, (total / g.target) * 100);
    return `<div class="goal-item">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:600;font-size:.9rem">${g.name}</div>
        <button class="btn btn-danger btn-sm" style="padding:3px 8px;font-size:.7rem" onclick="deleteGoal('${g.id}')">✕</button>
      </div>
      <div class="goal-bar"><div class="goal-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted)">
        <span>${pct.toFixed(0)}% מהיעד</span>
        <span>נשאר ${fmt(Math.max(0, g.target - total))}</span>
      </div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:2px">יעד: ${fmt(g.target)}</div>
    </div>`;
  }).join('');
}

// ── Chart ──
function renderChart() {
  const now = new Date();
  const months = Array.from({length:6}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - (5-i), 1);
    return { label: d.toLocaleDateString('he-IL',{month:'short'}), y:d.getFullYear(), m:d.getMonth(), inc:0, exp:0 };
  });
  for (const t of transactions) {
    const d = new Date(t.date);
    const slot = months.find(x => x.y===d.getFullYear() && x.m===d.getMonth());
    if (!slot) continue;
    if (t.type==='הכנסה'||t.type==='הכנסת בנק') slot.inc += Math.abs(t.amount);
    else if (t.type==='הוצאה'||t.type==='הוצאת בנק') slot.exp += Math.abs(t.amount);
  }
  const maxV = Math.max(1, ...months.map(m => Math.max(m.inc, m.exp)));
  document.getElementById('chart-area').innerHTML = `
    <div style="display:flex;gap:10px;align-items:flex-end;height:110px">
      ${months.map(m=>`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
          <div style="width:100%;display:flex;gap:3px;align-items:flex-end;height:90px">
            <div title="הכנסות ${fmt(m.inc)}" style="flex:1;border-radius:4px 4px 0 0;background:var(--green);opacity:.8;height:${(m.inc/maxV*88)}px;min-height:${m.inc>0?3:0}px"></div>
            <div title="הוצאות ${fmt(m.exp)}" style="flex:1;border-radius:4px 4px 0 0;background:var(--red);opacity:.8;height:${(m.exp/maxV*88)}px;min-height:${m.exp>0?3:0}px"></div>
          </div>
          <div style="font-size:.65rem;color:var(--muted);text-align:center">${m.label}</div>
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:16px;padding:8px 0 0;font-size:.75rem;color:var(--muted)">
      <span><span style="display:inline-block;width:8px;height:8px;background:var(--green);border-radius:2px;margin-left:5px"></span>הכנסות</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:var(--red);border-radius:2px;margin-left:5px"></span>הוצאות</span>
    </div>`;
}

// ── Auth listener ──
onAuthStateChanged(auth, (u) => {
  user = u;
  if (u) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('nav-user-name').textContent = u.displayName || u.email;
    document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];

    if (unsubTx) unsubTx();
    unsubTx = onSnapshot(
      query(userCol('transactions'), orderBy('createdAt', 'desc')),
      snap => {
        transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        computeStats(); renderTable(); renderGoals(); renderChart();
      }
    );

    if (unsubGoals) unsubGoals();
    unsubGoals = onSnapshot(userCol('goals'), snap => {
      goals = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderGoals();
    });
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    transactions = []; goals = [];
  }
});
</script>
</body>
</html>
